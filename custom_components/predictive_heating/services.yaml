train_model:
  name: Train Model
  description: Trigger immediate re-training of the thermal model from historical data. Optionally exclude date ranges with bad data.
  fields:
    exclude_periods:
      name: Exclude Periods
      description: >-
        List of date ranges to exclude from training.
        Each entry needs "start" and "end" in ISO format.
        Example: [{"start": "2026-03-15T00:00:00", "end": "2026-03-18T00:00:00"}]
      required: false
      selector:
        object:

set_schedule:
  name: Set Temperature Schedule
  description: Update the desired temperature schedule.
  fields:
    schedule:
      name: Schedule
      description: "Dictionary of time→temperature pairs, e.g. {'06:00': 20.0, '22:00': 17.0}"
      required: true
      selector:
        object:

get_forecast:
  name: Get Heating Forecast
  description: Returns the optimized heating plan with predicted temperatures.

force_optimization:
  name: Force Optimization
  description: Trigger an immediate optimization calculation and update all sensors (useful for testing without waiting 5 minutes).

set_model_params:
  name: Set Model Parameters
  description: >-
    Manually override the fitted UA and/or thermal mass values.
    Useful if you know your house's UA from an energy audit.
    Values persist until the next automatic training run overwrites them.
  fields:
    ua:
      name: UA (Heat Loss Coefficient)
      description: "Heat loss coefficient in W/K. Typical range: 50-500 for a house."
      required: false
      selector:
        number:
          min: 10
          max: 2000
          step: 1
          unit_of_measurement: "W/K"
    thermal_mass:
      name: Thermal Mass
      description: "Thermal capacitance in kWh/K. Typical range: 5-50 for a house."
      required: false
      selector:
        number:
          min: 1
          max: 200
          step: 0.5
          unit_of_measurement: "kWh/K"
